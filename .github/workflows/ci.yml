name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: purrfect_match_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel
        working-directory: backend
        env:
          APP_KEY: base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleQ==
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: purrfect_match_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          REDIS_CLIENT: predis
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CACHE_STORE: redis
          QUEUE_CONNECTION: sync
          BROADCAST_CONNECTION: log
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan migrate --force --seed
          php artisan test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: purrfect_match_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend && composer install --no-interaction --prefer-dist
          cd ../frontend && npm ci
          npx playwright install chromium --with-deps

      - name: Start stack
        env:
          APP_KEY: base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleQ==
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: purrfect_match_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          REDIS_CLIENT: predis
          REDIS_HOST: localhost
          QUEUE_CONNECTION: sync
          BROADCAST_CONNECTION: log
          FRONTEND_URL: http://localhost:3000
          SANCTUM_STATEFUL_DOMAINS: localhost:3000,127.0.0.1:3000
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate --force
          php artisan migrate --force --seed
          php artisan storage:link || true
          php artisan serve --host=127.0.0.1 --port=8000 &
          cd ../frontend
          npm run build
          npm run start -- --port 3000 &
          npx wait-on http://127.0.0.1:8000/up http://127.0.0.1:3000 --timeout 120000

      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
        run: npm run test:e2e
